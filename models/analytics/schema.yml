version: 2

models:
  - name: dim_vehicle
    description: "One row per unique vehicle make, model and year from EPA data"
    columns:
      - name: vehicle_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: manufacturer
        tests:
          - not_null
      - name: model_year
        tests:
          - not_null

  - name: dim_fuel
    description: "One row per unique fuel type and EPA rating combination"
    columns:
      - name: fuel_key
        tests:
          - unique
          - not_null
      - name: fuel_type
        tests:
          - not_null

  - name: dim_location
    description: "One row per unique state with region grouping"
    columns:
      - name: location_key
        tests:
          - unique
          - not_null
      - name: state_code
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "One row per unique listing date"
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null

